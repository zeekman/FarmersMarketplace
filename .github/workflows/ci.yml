name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'  # nightly at 02:00 UTC

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      JWT_SECRET: ci-test-secret
      STELLAR_NETWORK: testnet
      SMTP_HOST: ""
      SKIP_CONTRACT_TESTS: 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: ${{ runner.os }}-backend-${{ hashFiles('backend/package.json') }}
          restore-keys: |
            ${{ runner.os }}-backend-

      - name: Install dependencies
        run: npm install

      - name: Run tests with coverage
        run: npm run test:coverage

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-frontend-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-frontend-

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run lint
        run: npm run lint
        env:
          ESLINT_USE_FLAT_CONFIG: 'false'

  contract-tests-nightly:
    name: Contract Tests (nightly, Docker)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    defaults:
      run:
        working-directory: backend
    services:
      stellar:
        image: stellar/quickstart:latest
        ports:
          - 8000:8000
        options: >-
          --health-cmd "curl -sf http://localhost:8000/friendbot || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
    env:
      NODE_ENV: test
      JWT_SECRET: ci-test-secret
      STELLAR_NETWORK: testnet
      TEST_HORIZON_URL: http://localhost:8000
      TEST_SOROBAN_RPC_URL: http://localhost:8000/soroban/rpc
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run contract tests
        run: npm run test:contracts

  wasm-size-profile:
    name: WASM Size Profile (nightly)
  escrow-rust-tests:
    name: Escrow Contract Rust Tests (nightly)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contract/target
          key: ${{ runner.os }}-cargo-contract-${{ hashFiles('contract/Cargo.toml', 'contract/reward-token/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-contract-

      - name: Profile WASM binary sizes
        run: bash contract/wasm-profile.sh | tee wasm-profile.txt

      - name: Write job summary
        run: |
          echo "## WASM Binary Size Profile" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          cat wasm-profile.txt >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload size report
        uses: actions/upload-artifact@v4
        with:
          name: wasm-size-profile
          path: wasm-profile.txt
          retention-days: 30
            contracts/escrow/target
          key: ${{ runner.os }}-cargo-escrow-${{ hashFiles('contracts/escrow/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-escrow-

      - name: Run escrow contract Rust tests
        working-directory: contracts/escrow
        run: cargo test
