<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Farmers Marketplace</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, sans-serif; background: #f5f5f0; color: #222; }
      /* Muted text must meet 4.5:1 contrast on white — use #666 minimum */
      /* Skip navigation link — visible on focus for keyboard users */
      .skip-nav {
        position: absolute;
        top: -40px;
        left: 0;
        background: #2d6a4f;
        color: #fff;
        padding: 8px 16px;
        z-index: 10000;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        border-radius: 0 0 4px 0;
        transition: top 0.1s;
      }
      .skip-nav:focus { top: 0; }
      /* Ensure focus indicators are always visible */
      :focus-visible {
        outline: 3px solid #2d6a4f;
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <a href="#main-content" class="skip-nav">Skip to main content</a>
    <div id="root"></div>
    <!-- aria-live region for screen reader page change announcements -->
    <div id="page-announcer" aria-live="polite" aria-atomic="true" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
