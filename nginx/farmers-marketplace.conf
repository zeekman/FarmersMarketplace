# Nginx configuration for FarmersMarketplace
# Copy to: /etc/nginx/sites-available/farmers-marketplace.conf
# Symlink: ln -s /etc/nginx/sites-available/farmers-marketplace.conf \
#                /etc/nginx/sites-enabled/farmers-marketplace.conf
#
# After placing this file, run:
#   sudo nginx -t && sudo systemctl reload nginx
#
# After DNS is configured, obtain SSL with:
#   sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
# Certbot will automatically add the HTTPS server block.

# Gzip compression
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_buffers 16 8k;
gzip_http_version 1.1;
gzip_min_length 256;
gzip_types
    application/atom+xml
    application/geo+json
    application/javascript
    application/x-javascript
    application/json
    application/ld+json
    application/manifest+json
    application/rdf+xml
    application/rss+xml
    application/xhtml+xml
    application/xml
    font/eot
    font/otf
    font/ttf
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # ----------------------------------------------------------------
    # Security headers
    # ----------------------------------------------------------------
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ----------------------------------------------------------------
    # Backend API — proxy all /api/* requests to Express on port 4000
    # ----------------------------------------------------------------
    location /api/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;

        # Standard proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / keep-alive support
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_cache_bypass $http_upgrade;

        # Timeouts — increase for long-running Stellar/Soroban RPC calls
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    120s;

        # File upload size (matches multer defaults)
        client_max_body_size 10M;
    }

    # ----------------------------------------------------------------
    # Swagger API docs (served by the backend)
    # ----------------------------------------------------------------
    location /api-docs/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ----------------------------------------------------------------
    # Frontend static files — served directly from Vite build output
    # ----------------------------------------------------------------
    root /var/www/farmers-marketplace/frontend/dist;
    index index.html;

    location / {
        # SPA fallback: any path not matching a real file serves index.html
        try_files $uri $uri/ /index.html;
    }

    # Cache-busted JS/CSS chunks (Vite includes content hashes in filenames)
    location ~* \.(?:js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Long-lived cache for images and fonts
    location ~* \.(?:png|jpg|jpeg|gif|ico|svg|webp|avif|woff|woff2|ttf|eot)$ {
        expires 6M;
        add_header Cache-Control "public";
        access_log off;
    }

    # No cache for the HTML entry point (so new deployments are picked up)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ----------------------------------------------------------------
    # Logging
    # ----------------------------------------------------------------
    access_log /var/log/nginx/farmers-marketplace.access.log;
    error_log  /var/log/nginx/farmers-marketplace.error.log warn;
}
